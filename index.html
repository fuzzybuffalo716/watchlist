<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Watchlist</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:#0d0d0d;color:#e8e0d0;font-family:Georgia,serif;max-width:640px;margin:0 auto;min-height:100vh}
        h1{font-size:22px;font-weight:normal;font-style:italic;color:#f5e6c8;letter-spacing:.06em}
        .hdr{padding:18px 16px 12px;background:#111;border-bottom:1px solid #1e1e1e;position:sticky;top:0;z-index:50}
        .hdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
        .sub{color:#555;font-size:10px;margin-top:2px;letter-spacing:.1em}
        .btn-add{background:#c9a84c;color:#0d0d0d;border:none;border-radius:9px;padding:10px 16px;font-size:14px;font-family:Georgia,serif;font-style:italic;cursor:pointer;font-weight:bold}
        .tabs{display:flex;gap:8px;margin-bottom:10px}
        .tab{flex:1;padding:8px 4px;border:1px solid #222;border-radius:8px;background:#161616;color:#666;font-size:10px;cursor:pointer;font-family:Georgia,serif;letter-spacing:.08em;text-align:center;transition:all .2s}
        .tab.on{border-color:#c9a84c;background:rgba(201,168,76,.08);color:#c9a84c}
        .tc{font-size:20px;font-style:italic;color:#aaa;display:block;margin-bottom:1px}
        .tab.on .tc{color:#c9a84c}
        .srow{display:flex;gap:8px}
        .si{flex:1;background:#1a1a1a;color:#ddd;border:1px solid #2a2a2a;border-radius:8px;padding:10px 12px;font-size:14px;font-family:Georgia,serif;outline:none}
        .cb{padding:7px 16px;color:#444;font-size:10px;letter-spacing:.12em;border-bottom:1px solid #181818}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 10px 80px}
        @media(min-width:480px){.grid{grid-template-columns:repeat(3,1fr)}}
        .card{border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid #1e1e1e;background:#141414;transition:opacity .2s}
        .card:hover{border-color:#333}
        .card.dim{opacity:.5}
        .pw{position:relative;aspect-ratio:2/3;overflow:hidden;background:#1a1a1a}
        .pw svg{width:100%;height:100%;display:block}
        .pw img{width:100%;height:100%;object-fit:cover;display:none;position:absolute;top:0;left:0;z-index:1}
        .pw img.show{display:block}
        .bdg{position:absolute;top:6px;left:6px;color:#fff;font-size:8px;letter-spacing:.12em;padding:2px 6px;border-radius:3px;z-index:2}
        .bfam{background:#1b5e34}.bsolo{background:#4a1878}
        .bseen{position:absolute;top:6px;right:6px;background:#c9a84c;color:#0d0d0d;font-size:8px;padding:2px 6px;border-radius:3px;z-index:2}
        .ci{padding:8px 10px 10px}
        .ct{font-size:13px;color:#f0e8d8;line-height:1.3;margin-bottom:2px}
        .cy{font-size:10px;color:#555;margin-bottom:5px}
        .ov{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:150;display:none;align-items:flex-end}
        .ov.open{display:flex}
        .mbox{background:#141414;width:100%;max-width:560px;margin:0 auto;border-radius:18px 18px 0 0;max-height:90vh;overflow-y:auto}
        .mhero{position:relative;height:230px;overflow:hidden;background:#1a1a1a}
        .mhero img{width:100%;height:100%;object-fit:cover;display:none;position:absolute;top:0;left:0;z-index:1}
        .mhero img.show{display:block}
        .mgrad{position:absolute;inset:0;background:linear-gradient(transparent 40%,#141414 100%);z-index:2}
        .mclose{position:absolute;top:14px;right:14px;background:rgba(0,0,0,.6);border:none;color:#fff;width:34px;height:34px;border-radius:50%;cursor:pointer;z-index:3;display:flex;align-items:center;justify-content:center}
        .mbody{padding:16px 18px 36px}
        .mtitle{font-size:23px;color:#f5e6c8;font-style:italic;margin-bottom:4px}
        .mdesc{font-size:13px;color:#888;line-height:1.7;margin-bottom:16px}
        .btnw{width:100%;padding:13px;border-radius:9px;border:none;font-size:14px;cursor:pointer;font-family:Georgia,serif;font-style:italic}
        .btnw.unseen{background:#c9a84c;color:#0d0d0d}
        .btnw.seen{background:#242424;color:#777}
        .addmod{background:#161616;width:100%;max-width:560px;margin:0 auto;border-radius:18px 18px 0 0;padding:20px 18px 36px}
        .inp{width:100%;background:#1e1e1e;color:#e8e0d0;border:1px solid #333;border-radius:8px;padding:11px 13px;margin-top:5px;font-family:Georgia,serif}
        .btnadd{margin-top:22px;width:100%;padding:14px;background:#c9a84c;color:#0d0d0d;border:none;border-radius:10px;font-weight:bold;cursor:pointer}
    </style>
</head>
<body>

        <div><h1>The Watchlist</h1><div class="sub" id="sub">Loading...</div></div>
        <button class="btn-add" onclick="openAdd()">+ Add Film</button>
    </div>
    <div class="tabs">
        <button class="tab on" id="tAll" onclick="setList('All')"><span class="tc" id="cAll">0</span>ALL</button>
        <button class="tab" id="tFamily" onclick="setList('Family')"><span class="tc" id="cFamily">0</span>FAMILY</button>
        <button class="tab" id="tSolo" onclick="setList('Solo')"><span class="tc" id="cSolo">0</span>SOLO</button>
    </div>
    <div class="srow"><input class="si" placeholder="Search..." oninput="setSearch(this.value)"></div>
</div>
<div class="cb" id="cb"></div>
<div class="grid" id="grid"></div>

<div class="ov" id="dov" onclick="closeDet()">
    <div class="mbox" onclick="event.stopPropagation()">
        <div class="mhero" id="mhero"></div>
        <div class="mbody" id="mbody"></div>
    </div>
</div>

<div class="ov" id="aov" onclick="closeAdd()">
    <div class="addmod" onclick="event.stopPropagation()">
        <h2>Add a Film</h2>
        <input class="inp" id="ati" placeholder="Title">
        <input class="inp" id="ayi" placeholder="Year" type="number">
        <select class="inp" id="ali"><option value="Family">Family</option><option value="Solo">Solo</option></select>
        <button class="btnadd" onclick="submitAdd()">Add to Watchlist</button>
    </div>
</div>

let movies = [];
const pc = {}; 

function init() {
    const saved = localStorage.getItem(SAVE_KEY);
    if (saved) {
        try {
            const savedMovies = JSON.parse(saved);
            // Create a Map of saved movies by ID for quick lookup
            const savedMap = new Map(savedMovies.map(m => [m.id, m]));
            
            // Merge: Keep everything from SEED_DATA (with saved 'watched' states)
            // and append any custom movies that aren't in the SEED_DATA.
            const seedIds = new Set(SEED_DATA.map(m => m.id));
            
            movies = SEED_DATA.map(seedMovie => {
                const userVersion = savedMap.get(seedMovie.id);
                return userVersion ? { ...seedMovie, watched: userVersion.watched, list: userVersion.list } : seedMovie;
            });

            // Add back custom movies (those not found in the original SEED_DATA)
            const customMovies = savedMovies.filter(m => !seedIds.has(m.id));
            movies = [...movies, ...customMovies];

        } catch(e) { 
            console.error("Storage load failed, reverting to seed", e);
            movies = [...SEED_DATA]; 
        }
    } else {
        movies = [...SEED_DATA];
    }
    render();
}

function save() { localStorage.setItem(SAVE_KEY, JSON.stringify(movies)); }

async function fetchPoster(title, year) {
    const cacheKey = `${title}|${year}`;
    if (pc[cacheKey]) return pc[cacheKey];

    try {
        const q = encodeURIComponent(title);
        const r = await fetch(`https://api.themoviedb.org/3/search/movie?query=${q}&year=${year}`, {
            headers: { 
                'Authorization': `Bearer ${TOKEN}`, 
                'accept': 'application/json' 
            }
        });
        
        const d = await r.json();
        const results = d.results || [];

        // STRONGER MATCHING LOGIC:
        // Strip hyphens, dots, and spaces to find a match regardless of punctuation
        const clean = s => s.toLowerCase().replace(/[^a-z0-9]/g, '');
        const target = clean(title);

        const match = results.find(res => clean(res.title) === target && res.poster_path) 
                    || results.find(res => res.poster_path);

        if (match) {
            pc[cacheKey] = TIMG + match.poster_path;
            return pc[cacheKey];
        }
    } catch(e) { console.error("Poster fetch error for:", title, e); }
    return null;
}

function svgPlaceholder(m) {
    return `<svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
        <rect width="200" height="300" fill="${m.c1}"/>
        <text x="100" y="150" text-anchor="middle" fill="white" font-size="12" font-family="serif">${m.title}</text>
    </svg>`;
}

function render() {
    const grid = document.getElementById('grid');
    const filt = movies.filter(m => (aList === 'All' || m.list === aList) && 
        (!srch || m.title.toLowerCase().includes(srch.toLowerCase())));

    document.getElementById('cAll').textContent = movies.length;
    document.getElementById('cFamily').textContent = movies.filter(m => m.list === 'Family').length;
    document.getElementById('cSolo').textContent = movies.filter(m => m.list === 'Solo').length;
    document.getElementById('sub').textContent = `${movies.filter(m=>m.watched).length} WATCHED`;

    grid.innerHTML = filt.map(m => `
        <div class="card ${m.watched ? 'dim' : ''}" onclick="openDet(${m.id})">
            <div class="pw">
                ${svgPlaceholder(m)}
                <img id="p${m.id}" onload="this.style.display='block'">
                <div class="bdg b${m.list === 'Family' ? 'fam' : 'solo'}">${m.list.toUpperCase()}</div>
                ${m.watched ? '<div class="bseen">SEEN</div>' : ''}
            </div>
            <div class="ci">
                <div class="ct">${m.title}</div>
                <div class="cy">${m.year || 'TBD'}</div>
            </div>
        </div>
    `).join('');

    filt.forEach(async m => {
        const url = await fetchPoster(m.title, m.year);
        if (url) { const img = document.getElementById(`p${m.id}`); if(img) img.src = url; }
    });
}

let aList = 'All', srch = '';
function setList(l) { aList = l; document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on')); document.getElementById('t'+l).classList.add('on'); render(); }
function setSearch(v) { srch = v; render(); }

function openDet(id) {
    const m = movies.find(x => x.id === id);
    document.getElementById('mhero').innerHTML = `<div class="mgrad"></div><button class="mclose" onclick="closeDet()">✕</button><img id="mh${m.id}" style="width:100%; height:100%; object-fit:cover; display:block">`;
    document.getElementById('mbody').innerHTML = `<h2 class="mtitle">${m.title} (${m.year || 'TBD'})</h2><p class="mdesc">${m.desc}</p>
        <button class="btnw ${m.watched ? 'seen' : 'unseen'}" onclick="togW(${m.id})">${m.watched ? 'Mark Unwatched' : 'Mark Watched'}</button>`;
    
    fetchPoster(m.title, m.year).then(url => { if(url) document.getElementById(`mh${m.id}`).src = url; });
    document.getElementById('dov').style.display = 'flex';
}

function closeDet() { document.getElementById('dov').style.display = 'none'; }
function togW(id) { movies = movies.map(m => m.id === id ? {...m, watched: !m.watched} : m); save(); closeDet(); render(); }
function openAdd() { document.getElementById('aov').style.display = 'flex'; }
function closeAdd() { document.getElementById('aov').style.display = 'none'; }

function submitAdd() {
    const t = document.getElementById('ati').value;
    const y = document.getElementById('ayi').value;
    const l = document.getElementById('ali').value;
    if(!t) return;
    movies.push({id: Date.now(), title: t, year: y, list: l, watched: false, c1: '#333', c2: '#444', desc: "Added manually."});
    save(); closeAdd(); render();
}

init();
</script>
