<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Watchlist</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:#0d0d0d;color:#e8e0d0;font-family:Georgia,serif;max-width:640px;margin:0 auto;min-height:100vh}
        h1{font-size:22px;font-weight:normal;font-style:italic;color:#f5e6c8;letter-spacing:.06em}
        .hdr{padding:18px 16px 12px;background:#111;border-bottom:1px solid #1e1e1e;position:sticky;top:0;z-index:50}
        .hdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
        .sub{color:#555;font-size:10px;margin-top:2px;letter-spacing:.1em}
        .btn-add{background:#c9a84c;color:#0d0d0d;border:none;border-radius:9px;padding:10px 16px;font-size:14px;font-family:Georgia,serif;font-style:italic;cursor:pointer;font-weight:bold}
        .tabs{display:flex;gap:8px;margin-bottom:10px}
        .tab{flex:1;padding:8px 4px;border:1px solid #222;border-radius:8px;background:#161616;color:#666;font-size:10px;cursor:pointer;font-family:Georgia,serif;letter-spacing:.08em;text-align:center;transition:all .2s}
        .tab.on{border-color:#c9a84c;background:rgba(201,168,76,.08);color:#c9a84c}
        .tc{font-size:20px;font-style:italic;color:#aaa;display:block;margin-bottom:1px}
        .tab.on .tc{color:#c9a84c}
        .srow{display:flex;gap:8px}
        .si{flex:1;background:#1a1a1a;color:#ddd;border:1px solid #2a2a2a;border-radius:8px;padding:10px 12px;font-size:14px;font-family:Georgia,serif;outline:none}
        .bf{padding:10px 14px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;color:#888;font-size:18px;cursor:pointer}
        .bf.on{background:rgba(201,168,76,.13);border-color:#c9a84c;color:#c9a84c}
        .fp{padding:14px 16px;background:#0f0f0f;border-bottom:1px solid #1a1a1a;display:none}
        .fl{font-size:9px;color:#555;letter-spacing:.14em;margin-bottom:7px}
        .pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
        .pill{padding:4px 10px;border:1px solid #2a2a2a;border-radius:20px;background:transparent;color:#666;font-size:10px;cursor:pointer;font-family:Georgia,serif;white-space:nowrap;transition:all .15s}
        .pill.on{border-color:#c9a84c;background:rgba(201,168,76,.13);color:#c9a84c}
        .pill.clr{border-color:#444;color:#888}
        .wtog{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:11px;color:#888;margin-bottom:12px}
        .wtog input{accent-color:#c9a84c;width:15px;height:15px}
        .cb{padding:7px 16px;color:#444;font-size:10px;letter-spacing:.12em;border-bottom:1px solid #181818}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 10px 80px}
        @media(min-width:480px){.grid{grid-template-columns:repeat(3,1fr)}}
        .card{border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid #1e1e1e;background:#141414;transition:opacity .2s}
        .card:hover{border-color:#333}
        .card.dim{opacity:.5}
        .pw{position:relative;aspect-ratio:2/3;overflow:hidden;background:#1a1a1a}
        .pw svg{width:100%;height:100%;display:block}
        .pw img{width:100%;height:100%;object-fit:cover;display:none;position:absolute;top:0;left:0;z-index:1}
        .pw img.show{display:block}
        .bdg{position:absolute;top:6px;left:6px;color:#fff;font-size:8px;letter-spacing:.12em;padding:2px 6px;border-radius:3px;z-index:2}
        .bfam{background:#1b5e34}.bsolo{background:#4a1878}
        .bseen{position:absolute;top:6px;right:6px;background:#c9a84c;color:#0d0d0d;font-size:8px;padding:2px 6px;border-radius:3px;z-index:2}
        .ci{padding:8px 10px 10px}
        .ct{font-size:13px;color:#f0e8d8;line-height:1.3;margin-bottom:2px}
        .cy{font-size:10px;color:#555;margin-bottom:5px}
        .gp{display:flex;flex-wrap:wrap;gap:3px}
        .gt{font-size:9px;color:#777;border:1px solid #252525;padding:1px 5px;border-radius:3px}
        .ov{position:fixed;inset:0;background:rgba(0,0,0,.73);z-index:150;display:none;align-items:flex-end}
        .ov.open{display:flex}
        .mbox{background:#141414;width:100%;max-width:560px;margin:0 auto;border-radius:18px 18px 0 0;max-height:90vh;overflow-y:auto;box-shadow:0 -16px 60px #000}
        .mhero{position:relative;height:230px;overflow:hidden;border-radius:18px 18px 0 0;background:#1a1a1a;flex-shrink:0}
        .mhero svg{width:100%;height:100%;display:block}
        .mhero img{width:100%;height:100%;object-fit:cover;display:none;position:absolute;top:0;left:0;z-index:1}
        .mhero img.show{display:block}
        .mgrad{position:absolute;inset:0;background:linear-gradient(transparent 40%,#141414 100%);z-index:2}
        .mclose{position:absolute;top:14px;right:14px;background:rgba(0,0,0,.67);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:3}
        .mbadges{position:absolute;top:14px;left:14px;display:flex;gap:6px;z-index:3}
        .mbadges span{color:#fff;font-size:9px;letter-spacing:.12em;padding:3px 8px;border-radius:4px}
        .mbody{padding:16px 18px 36px}
        .mtitle{font-size:23px;color:#f5e6c8;font-style:italic;line-height:1.2;margin-bottom:4px}
        .myear{font-size:12px;color:#555;margin-bottom:12px}
        .mgenres{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
        .mgenres span{font-size:10px;color:#888;border:1px solid #2a2a2a;padding:2px 8px;border-radius:4px}
        .mdesc{font-size:13px;color:#888;line-height:1.7;margin-bottom:16px}
        .dets{border-top:1px solid #1e1e1e;padding-top:16px;margin-bottom:16px}
        .drow{display:flex;gap:12px;margin-bottom:11px;align-items:flex-start}
        .dlbl{font-size:9px;color:#555;letter-spacing:.13em;min-width:64px;padding-top:2px;flex-shrink:0}
        .dval{font-size:13px;color:#d0c8b8;line-height:1.55;flex:1}
        .whybox{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:12px 14px;margin-top:8px}
        .whylbl{font-size:9px;color:#c9a84c;letter-spacing:.14em;margin-bottom:6px}
        .whytxt{font-size:13px;color:#c0b8a8;line-height:1.65;font-style:italic}
        .btnw{width:100%;padding:13px;border-radius:9px;border:none;font-size:14px;cursor:pointer;font-family:Georgia,serif;font-style:italic}
        .btnw.unseen{background:#c9a84c;color:#0d0d0d}
        .btnw.seen{background:#242424;color:#777}
        .addmod{background:#161616;width:100%;max-width:560px;margin:0 auto;border-radius:18px 18px 0 0;padding:20px 18px 36px;box-shadow:0 -12px 60px #000}
        .dragbar{width:36px;height:4px;background:#333;border-radius:2px;margin:0 auto 18px}
        .addhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
        .addtitle{font-size:20px;color:#f5e6c8;font-style:italic}
        .btnx{background:none;border:none;color:#555;font-size:24px;cursor:pointer;padding:4px;line-height:1}
        .lbl{font-size:11px;color:#666;letter-spacing:.1em;display:block;margin-top:16px}
        .inp{width:100%;background:#1e1e1e;color:#e8e0d0;border:1px solid #333;border-radius:8px;padding:11px 13px;font-size:15px;font-family:Georgia,serif;outline:none;margin-top:5px}
        .inprow{display:flex;gap:10px}
        .inprow>div{flex:1}
        .errmsg{color:#e57373;font-size:12px;margin-top:8px}
        .btnadd{margin-top:22px;width:100%;padding:14px;background:#c9a84c;color:#0d0d0d;border:none;border-radius:10px;font-size:16px;font-family:Georgia,serif;font-style:italic;cursor:pointer;font-weight:bold}
        .empty{text-align:center;color:#444;padding:60px 0;font-size:12px;letter-spacing:.12em}
    </style>
</head>
<body>
<div class="hdr">
  <div class="hdr-row">
    <div><h1>The Watchlist</h1><div class="sub" id="sub"></div></div>
    <button class="btn-add" onclick="openAdd()">+ Add Film</button>
  </div>
  <div class="tabs">
    <button class="tab on" id="tAll" onclick="setList('All')"><span class="tc" id="cAll">0</span>ALL</button>
    <button class="tab" id="tFamily" onclick="setList('Family')"><span class="tc" id="cFamily">0</span>FAMILY</button>
    <button class="tab" id="tSolo" onclick="setList('Solo')"><span class="tc" id="cSolo">0</span>SOLO</button>
  </div>
  <div class="srow">
    <input class="si" placeholder="Search..." oninput="setSearch(this.value)">
    <button class="bf" id="fbtn" onclick="toggleF()">&#9881;</button>
  </div>
</div>
<div id="fp" class="fp">
  <div class="fl">SORT</div><div class="pills" id="spills"></div>
  <label class="wtog"><input type="checkbox" id="sw" checked onchange="render()"> SHOW WATCHED</label>
  <div class="fl">GENRE</div><div class="pills" id="gpills"></div>
</div>
<div class="cb" id="cb"></div>
<div class="grid" id="grid"></div>
<div class="empty" id="empty" style="display:none">NO FILMS MATCH</div>

<div class="ov" id="dov" onclick="closeDet()">
  <div class="mbox" onclick="event.stopPropagation()">
    <div class="mhero" id="mhero"></div>
    <div class="mbody" id="mbody"></div>
  </div>
</div>

<div class="ov" id="aov" onclick="closeAdd()">
  <div class="addmod" onclick="event.stopPropagation()">
    <div class="dragbar"></div>
    <div class="addhead"><span class="addtitle">Add a Film</span><button class="btnx" onclick="closeAdd()">&#10005;</button></div>
    <label class="lbl">TITLE *</label><input class="inp" id="ati" placeholder="Film title">
    <div class="inprow">
      <div><label class="lbl">YEAR</label><input class="inp" id="ayi" placeholder="2024" type="number"></div>
      <div><label class="lbl">LIST</label><select class="inp" id="ali"><option value="Family">Family</option><option value="Solo">Solo</option></select></div>
    </div>
    <label class="lbl">GENRES (comma separated)</label><input class="inp" id="agi" placeholder="Drama, Comedy">
    <label class="lbl">DESCRIPTION</label><input class="inp" id="adi" placeholder="One-line summary">
    <div class="errmsg" id="aerr"></div>
    <button class="btnadd" onclick="submitAdd()">Add to Watchlist</button>
  </div>
</div>

var SEED = JSON.parse(atob(_b64));
var movies = SEED.slice();

try {
    var saved = localStorage.getItem(SAVE_KEY);
    if(saved) {
        var parsed = JSON.parse(saved);
        if(Array.isArray(parsed)) {
            var seedIds = {}; SEED.forEach(function(m){ seedIds[m.id] = true; });
            var savedMap = {}; parsed.forEach(function(m){ savedMap[m.id] = m; });
            movies = SEED.map(function(m){
                var s = savedMap[m.id];
                return s ? Object.assign({}, m, {watched: s.watched, list: s.list}) : m;
            });
            parsed.forEach(function(m){ if(!seedIds[m.id]) movies.push(m); });
        }
    }
} catch(e) { console.error("Storage load failed", e); }

var pc = {};
function saveState() { try { localStorage.setItem(SAVE_KEY, JSON.stringify(movies)); } catch(e) {} }

async function findPoster(title, year) {
    var k = (title + '|' + (year || '')).toLowerCase();
    if(k in pc) return pc[k];
    try {
        var q = encodeURIComponent(title);
        var yr = year ? ('&primary_release_year=' + year) : '';
        var r = await fetch(TBASE + '/search/movie?query=' + q + yr, { headers: { 'Authorization': 'Bearer ' + TOKEN, 'accept': 'application/json' } });
        var d = await r.json();
        var m = (d.results || []).find(function(x){ return x.poster_path; });
        if(m) pc[k] = TIMG + m.poster_path;
    } catch(e) {}
    return pc[k];
}

function showImg(id, url) {
    if(!url) return;
    var el = document.getElementById(id);
    if(!el) return;
    var img = new Image();
    img.onload = function() { el.src = url; el.className = 'show'; };
    img.src = url;
}

function svgCard(m) {
    var t = m.title.length > 20 ? m.title.substring(0, 18) + '...' : m.title;
    return '<svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">'
        + '<defs><linearGradient id="g' + m.id + '" x1="0%" y1="0%" x2="100%" y2="100%">'
        + '<stop offset="0%" stop-color="' + m.c1 + '"/><stop offset="100%" stop-color="' + m.c2 + '"/>'
        + '</linearGradient></defs>'
        + '<rect width="200" height="300" fill="url(#g' + m.id + ')"/>'
        + '<text x="100" y="244" text-anchor="middle" font-size="11" fill="#f5e6c8" font-style="italic">' + t + '</text>'
        + '<text x="100" y="262" text-anchor="middle" font-size="10" fill="#c9a84c">' + (m.year || 'TBD') + '</text>'
        + '</svg>';
}

function cardHTML(m) {
    return '<div class="card' + (m.watched ? ' dim' : '') + '" onclick="openDet(' + m.id + ')">'
        + '<div class="pw">' + svgCard(m) + '<img id="pi' + m.id + '" alt="">'
        + '<div class="bdg b' + (m.list === 'Family' ? 'fam' : 'solo') + '">' + m.list.toUpperCase() + '</div>'
        + (m.watched ? '<div class="bseen">SEEN</div>' : '')
        + '</div><div class="ci"><div class="ct">' + m.title + '</div><div class="cy">' + (m.year || 'TBD') + '</div></div></div>';
}

var aList = 'All', sg = [], sb = 'list', srch = '';

function getFilt() {
    var m = movies;
    if(aList !== 'All') m = m.filter(function(x){ return x.list === aList; });
    var sw = document.getElementById('sw');
    if(sw && !sw.checked) m = m.filter(function(x){ return !x.watched; });
    if(srch.trim()) {
        var s = srch.toLowerCase();
        m = m.filter(function(x){ return x.title.toLowerCase().indexOf(s) >= 0; });
    }
    return m;
}

function render() {
    var fam = movies.filter(function(m){ return m.list === 'Family'; }).length;
    var sol = movies.filter(function(m){ return m.list === 'Solo'; }).length;
    var seen = movies.filter(function(m){ return m.watched; }).length;
    document.getElementById('sub').textContent = seen + ' WATCHED - ' + (movies.length - seen) + ' TO GO';
    document.getElementById('cAll').textContent = movies.length;
    document.getElementById('cFamily').textContent = fam;
    document.getElementById('cSolo').textContent = sol;
    
    var filt = getFilt();
    document.getElementById('cb').textContent = filt.length + ' FILM' + (filt.length !== 1 ? 'S' : '');
    document.getElementById('grid').innerHTML = filt.map(cardHTML).join('');
    filt.forEach(function(m){ if(m.year) findPoster(m.title, m.year).then(function(url){ showImg('pi' + m.id, url); }); });
}

function setList(l){ aList = l; render(); }
function setSearch(v){ srch = v; render(); }
function toggleF(){ var p = document.getElementById('fp'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }

function openDet(id) {
    var m = movies.find(function(x){ return x.id === id; });
    if(!m) return;
    document.getElementById('mhero').innerHTML = svgCard(m) + '<img id="mhi' + m.id + '"><div class="mgrad"></div><button class="mclose" onclick="closeDet()">✕</button>';
    if(m.year) findPoster(m.title, m.year).then(function(url){ showImg('mhi' + m.id, url); });
    document.getElementById('mbody').innerHTML = '<div class="mtitle">' + m.title + '</div><p class="mdesc">' + m.desc + '</p>'
        + '<button class="btnw ' + (m.watched ? 'seen' : 'unseen') + '" onclick="togW(' + m.id + ')">' + (m.watched ? 'Unwatch' : 'Watched') + '</button>';
    document.getElementById('dov').className = 'ov open';
}

function closeDet(){ document.getElementById('dov').className = 'ov'; }
function togW(id){ movies = movies.map(function(m){ return m.id === id ? Object.assign({}, m, {watched: !m.watched}) : m; }); saveState(); closeDet(); render(); }
function openAdd(){ document.getElementById('aov').className = 'ov open'; }
function closeAdd(){ document.getElementById('aov').className = 'ov'; }

function submitAdd() {
    var t = document.getElementById('ati').value.trim();
    if(!t) return;
    movies.push({id: Date.now(), title: t, list: document.getElementById('ali').value, genre: ['Drama'], desc: 'Added manually.', watched: false, c1: '#1a2a3a', c2: '#2d3a4a'});
    saveState(); closeAdd(); render();
}

render();
</script>
</body>
</html>
