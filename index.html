<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Watchlist</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #c9a84c; --bg: #0d0d0d; --card: #161616; --border: #262626; }
        *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent;}
        body{background:var(--bg); color:#e8e0d0; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width:600px; margin:0 auto; min-height:100vh; overflow-x:hidden;}
        
        /* Header & Navigation */
        .hdr{padding:15px 15px 10px; background:rgba(17,17,17,0.95); backdrop-filter:blur(10px); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100;}
        .hdr-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;}
        h1{font-family:Georgia, serif; font-size:20px; font-style:italic; color:#f5e6c8;}
        .sub{color:#666; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; margin-top:2px;}
        
        .btn-add{background:var(--gold); color:#000; border:none; border-radius:20px; padding:8px 16px; font-size:13px; font-weight:bold; cursor:pointer;}
        
        .tabs{display:flex; gap:6px; margin-bottom:12px;}
        .tab{flex:1; padding:10px 0; border:1px solid var(--border); border-radius:12px; background:var(--card); color:#555; cursor:pointer; display:flex; flex-direction:column; align-items:center; transition:0.2s;}
        .tab.on{border-color:var(--gold); background:rgba(201,168,76,0.1); color:var(--gold);}
        .tab i{font-size:20px; margin-bottom:2px; font-style: normal;}
        .tab span{font-size:10px; font-weight:bold;}
        
        .srow{display:flex; flex-direction:column; gap:8px;}
        .si{width:100%; background:#1a1a1a; color:#fff; border:1px solid var(--border); border-radius:10px; padding:12px; font-size:16px; outline:none;}
        .sf{width:100%; background:#1a1a1a; color:var(--gold); border:1px solid var(--border); border-radius:10px; padding:10px; font-size:13px;}

        /* Movie Grid */
        .grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:15px 15px 100px;}
        @media(min-width:450px){ .grid{grid-template-columns:repeat(3,1fr);} }
        
        .card{border-radius:12px; overflow:hidden; background:var(--card); border:1px solid var(--border); position:relative;}
        .card.dim{opacity:0.35; filter: grayscale(0.5);}
        .pw{position:relative; aspect-ratio:2/3; background:#111;}
        .pw img{width:100%; height:100%; object-fit:cover; display:none;}
        .pw img.show{display:block;}
        
        .bdg{position:absolute; top:8px; left:8px; z-index:2; font-size:14px; background:rgba(0,0,0,0.4); padding:4px; border-radius:6px; backdrop-filter:blur(4px);}
        
        .ci{padding:10px;}
        .ct{font-size:13px; font-weight:600; color:#f0e8d8; line-height:1.2; margin-bottom:4px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
        .cy{font-size:11px; color:#666;}

        /* Modals (Bottom Sheets) */
        .ov{position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:200; display:none; align-items:flex-end; padding-top:40px;}
        .ov.open{display:flex;}
        .mbox{background:#141414; width:100%; border-radius:25px 25px 0 0; max-height:95vh; overflow-y:auto; position:relative;}
        
        .mhero{height:300px; position:relative; background:#000;}
        .mhero img{width:100%; height:100%; object-fit:cover;}
        .mgrad{position:absolute; inset:0; background:linear-gradient(transparent 40%, #141414 100%);}
        .mclose{position:absolute; top:15px; right:15px; background:rgba(255,255,255,0.1); border:none; color:#fff; width:36px; height:36px; border-radius:50%; font-size:20px; z-index:10;}
        
        .mbody{padding:20px 20px 60px;}
        .mtitle{font-family:Georgia, serif; font-size:26px; color:#f5e6c8; font-style:italic; margin-bottom:10px;}
        .mdesc{font-size:16px; color:#bbb; line-height:1.6; margin-bottom:30px;}
        
        .mbtns{display:flex; flex-direction:column; gap:12px;}
        .btnw{width:100%; padding:16px; border-radius:14px; border:none; font-size:16px; font-weight:bold; cursor:pointer;}
        .btnw.unseen{background:var(--gold); color:#000;}
        .btnw.seen{background:#2a2a2a; color:#888;}
        
        .m-move{background:#1a1a1a; border:1px solid #333; color:#aaa; padding:14px; border-radius:12px; font-size:14px; width:100%; -webkit-appearance:none;}
        .btn-del{margin-top:30px; background:none; border:none; color:#632a2a; font-size:12px; font-weight:bold; text-align:center; width:100%; text-decoration:underline; padding:10px;}

        /* Autocomplete */
        .as-results{background:#222; border-radius:12px; margin-top:5px; max-height:250px; overflow-y:auto; border:1px solid #333;}
        .as-item{padding:15px; border-bottom:1px solid #333; display:flex; gap:10px; align-items:center;}
        .as-item img{width:40px; height:60px; border-radius:4px; object-fit:cover;}
        .as-item div{font-size:14px; color:#eee;}
    </style>
</head>
<body>

<div class="hdr">
    <div class="hdr-top">
        <div>
            <h1>The Watchlist</h1>
            <div class="sub" id="sub">Loading...</div>
        </div>
        <button class="btn-add" onclick="openAdd()">+ Movie</button>
    </div>
    
    <div class="tabs">
        <div class="tab on" id="tAll" onclick="setList('All')"><i>🎞️</i><span id="cAll">0</span></div>
        <div class="tab" id="tFamily" onclick="setList('Family')"><i>🐶</i><span id="cFamily">0</span></div>
        <div class="tab" id="tBrian" onclick="setList('Brian')"><i>🤷🏻‍♂️</i><span id="cBrian">0</span></div>
        <div class="tab" id="tDawn & Brian" onclick="setList('Dawn & Brian')"><i>👩🏼‍❤️‍👨🏻</i><span id="cDawnBr">0</span></div>
        <div class="tab" id="tDawn" onclick="setList('Dawn')"><i>👩🏼</i><span id="cDawn">0</span></div>
    </div>
    
    <div class="srow">
        <input class="si" id="searchInp" placeholder="Search my movies..." oninput="setSearch(this.value)">
        <select class="sf" id="genreFilt" onchange="setGenre(this.value)">
            <option value="All">All Genres</option>
        </select>
    </div>
</div>

<div class="grid" id="grid"></div>

<div class="ov" id="dov" onclick="closeDet()">
    <div class="mbox" onclick="event.stopPropagation()">
        <button class="mclose" onclick="closeDet()">✕</button>
        <div class="mhero" id="mhero"></div>
        <div class="mbody" id="mbody"></div>
    </div>
</div>

<div class="ov" id="aov" onclick="closeAdd()">
    <div class="mbox" onclick="event.stopPropagation()">
        <div style="padding:25px 20px 60px;">
            <h2 style="font-family:serif; font-style:italic; margin-bottom:20px; color:var(--gold)">Add to Watchlist</h2>
            <input class="si" id="ati" placeholder="Type title..." oninput="handleSuggest(this.value)" autocomplete="off">
            <div id="asRes" class="as-results" style="display:none"></div>
            
            <input class="si" id="ayi" placeholder="Year" type="number" style="margin-top:10px">
            
            <select class="m-move" id="ali" style="margin-top:10px; background:#1a1a1a; color:#fff">
                <option value="Family">🐶 Family List</option>
                <option value="Brian">🤷🏻‍♂️ Brian's List</option>
                <option value="Dawn & Brian">👩🏼‍❤️‍👨🏻 Dawn & Brian</option>
                <option value="Dawn">👩🏼 Dawn's List</option>
            </select>
            
            <button class="btnw unseen" style="margin-top:20px" onclick="submitAdd()">Add Movie</button>
        </div>
    </div>
</div>

<script>
window.onerror = function(m, u, l) { alert('Error: ' + m); };

const SUPABASE_URL = 'https://omcxkfjupbpelnepvvch.supabase.co';
const SUPABASE_KEY = 'sb_publishable__y_hIOsIHu-Z7CVYpk0ueQ_c0hstZvv'; 
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const TMDB_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiIyODAzZDBjMjU0MmM3OTJhZmZlYjQwNDZmODExOGM3YyIsIm5iZiI6MTc3NTYwNzk0Ny4wNTksInN1YiI6IjY5ZDVhMDhiYTg0NThlY2FlM2VkZjkyNiIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.nPaW_tN4VyBm5ryaB7S9RjAvGg9f3JnZi859AbiYE84';
const TIMG = 'https://image.tmdb.org/t/p/w500';

let movies = [], aList = 'All', srch = '', aGenre = 'All', selectedMovie = null;

async function init() {
    const { data, error } = await sb.from('movies').select('*').order('title');
    if (!error) { 
        // Logic bridge: Treat 'Solo' as 'Brian' automatically if found
        movies = data.map(m => m.list === 'Solo' ? {...m, list: 'Brian'} : m);
        populateGenres(); 
        render(); 
    }
}

function populateGenres() {
    const gs = [...new Set(movies.flatMap(m => m.genre || []))].sort();
    const sel = document.getElementById('genreFilt');
    sel.innerHTML = '<option value="All">All Genres</option>' + gs.map(g => `<option value="${g}">${g}</option>`).join('');
}

function getIcon(list) {
    if (list === 'Family') return '🐶';
    if (list === 'Brian') return '🤷🏻‍♂️';
    if (list === 'Dawn & Brian') return '👩🏼‍❤️‍👨🏻';
    if (list === 'Dawn') return '👩🏼';
    return '🎞️';
}

function render() {
    const grid = document.getElementById('grid');
    const filt = movies.filter(m => 
        (aList === 'All' || m.list === aList) && 
        (aGenre === 'All' || (m.genre && m.genre.includes(aGenre))) &&
        (!srch || m.title.toLowerCase().includes(srch.toLowerCase()))
    );

    document.getElementById('cAll').textContent = movies.length;
    document.getElementById('cFamily').textContent = movies.filter(m => m.list === 'Family').length;
    document.getElementById('cBrian').textContent = movies.filter(m => m.list === 'Brian').length;
    document.getElementById('cDawnBr').textContent = movies.filter(m => m.list === 'Dawn & Brian').length;
    document.getElementById('cDawn').textContent = movies.filter(m => m.list === 'Dawn').length;
    document.getElementById('sub').textContent = movies.filter(m=>m.watched).length + ' WATCHED';

    grid.innerHTML = filt.map(m => `
        <div class="card ${m.watched?'dim':''}" onclick="openDet(${m.id})">
            <div class="pw">
                <div class="bdg">${getIcon(m.list)}</div>
                <img id="p${m.id}" class="show" src="${m.poster_url || ''}" onerror="this.style.display='none'">
            </div>
            <div class="ci">
                <div class="ct">${m.title}</div>
                <div class="cy">${m.year || ''}</div>
            </div>
        </div>
    `).join('');
}

async function handleSuggest(q) {
    const resDiv = document.getElementById('asRes');
    if (q.length < 3) { resDiv.style.display = 'none'; return; }
    const r = await fetch(`https://api.themoviedb.org/3/search/movie?query=${encodeURIComponent(q)}`, {
        headers: { 'Authorization': 'Bearer ' + TMDB_TOKEN }
    });
    const d = await r.json();
    const items = d.results.slice(0, 5);
    resDiv.innerHTML = items.map(m => `
        <div class="as-item" onclick="selectSuggest(${m.id}, '${m.title.replace(/'/g, "\\'")}', '${m.release_date}', '${m.poster_path}', '${m.overview.replace(/'/g, "\\'")}', '${(m.genre_ids||[]).join(",")}')">
            <img src="${TIMG + m.poster_path}">
            <div><strong>${m.title}</strong><br><span style="color:#666">${m.release_date?m.release_date.split('-')[0]:''}</span></div>
        </div>
    `).join('');
    resDiv.style.display = 'block';
}

const genreMap = { 28: "Action", 12: "Adventure", 16: "Animation", 35: "Comedy", 80: "Crime", 99: "Documentary", 18: "Drama", 10751: "Family", 14: "Fantasy", 36: "History", 27: "Horror", 10402: "Music", 9648: "Mystery", 10749: "Romance", 878: "Sci-Fi", 10770: "TV Movie", 53: "Thriller", 10752: "War", 37: "Western" };

function selectSuggest(id, title, date, path, desc, gids) {
    document.getElementById('ati').value = title;
    const year = date ? date.split('-')[0] : '';
    document.getElementById('ayi').value = year;
    const genres = gids.split(",").map(id => genreMap[id]).filter(n => n);
    selectedMovie = { title, year: parseInt(year), desc, poster_url: TIMG + path, genre: genres };
    document.getElementById('asRes').style.display = 'none';
}

async function submitAdd() {
    const title = document.getElementById('ati').value;
    const list = document.getElementById('ali').value;
    if (!title) return;
    const payload = selectedMovie || { title, year: document.getElementById('ayi').value, list, desc: "Added manually" };
    payload.list = list;
    payload.watched = false;
    const { data, error } = await sb.from('movies').insert([payload]).select();
    if (!error) { movies.push(data[0]); populateGenres(); render(); closeAdd(); }
}

function openDet(id) {
    const m = movies.find(x => x.id === id);
    document.getElementById('mhero').innerHTML = `<div class="mgrad"></div><img src="${m.poster_url}" onerror="this.style.display='none'">`;
    document.getElementById('mbody').innerHTML = `
        <h2 class="mtitle">${m.title} (${m.year})</h2>
        <p class="mdesc">${m.desc || ''}</p>
        <div class="mbtns">
            <button class="btnw ${m.watched?'seen':'unseen'}" onclick="togW(${m.id})">${m.watched?'Unwatch':'Mark Watched'}</button>
            <select class="m-move" onchange="moveCat(${m.id}, this.value)">
                <option value="">Move Category...</option>
                <option value="Family">🐶 Family</option>
                <option value="Brian">🤷🏻‍♂️ Brian</option>
                <option value="Dawn & Brian">👩🏼‍❤️‍👨🏻 Dawn & Brian</option>
                <option value="Dawn">👩🏼 Dawn</option>
            </select>
            <button class="btn-del" onclick="deleteMovie(${m.id})">Delete Movie</button>
        </div>
    `;
    document.getElementById('dov').classList.add('open');
}

async function moveCat(id, nl) {
    if (!nl) return;
    const { error } = await sb.from('movies').update({ list: nl }).eq( 'id', id);
    if (!error) { movies = movies.map(m => m.id === id ? {...m, list: nl} : m); render(); closeDet(); }
}

async function deleteMovie(id) {
    if (!confirm("Delete this movie?")) return;
    const { error } = await sb.from('movies').delete().eq('id', id);
    if (!error) { movies = movies.filter(m => m.id !== id); render(); closeDet(); }
}

async function togW(id) {
    const m = movies.find(x => x.id === id);
    const { error } = await sb.from('movies').update({ watched: !m.watched }).eq('id', id);
    if (!error) { movies = movies.map(x => x.id === id ? {...x, watched: !x.watched} : x); render(); closeDet(); }
}

function setList(l) { aList = l; document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on')); document.getElementById('t'+l).classList.add('on'); render(); }
function setSearch(v) { srch = v; render(); }
function setGenre(v) { aGenre = v; render(); }
function openAdd() { document.getElementById('aov').classList.add('open'); selectedMovie = null; document.getElementById('ati').value=''; }
function closeAdd() { document.getElementById('aov').classList.remove('open'); }
function closeDet() { document.getElementById('dov').classList.remove('open'); }

init();
</script>
</body>
</html>
