<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>The Watchlist</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#e8e0d0;font-family:Georgia,serif;max-width:640px;margin:0 auto;min-height:100vh}
h1{font-size:22px;font-weight:normal;font-style:italic;color:#f5e6c8;letter-spacing:.06em}
.header{padding:18px 16px 12px;background:#111;border-bottom:1px solid #1e1e1e;position:sticky;top:0;z-index:50}
.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.subtitle{color:#555;font-size:10px;margin-top:2px;letter-spacing:.1em}
.btn-add{background:#c9a84c;color:#0d0d0d;border:none;border-radius:9px;padding:10px 16px;font-size:14px;font-family:Georgia,serif;font-style:italic;cursor:pointer;font-weight:bold}
.tabs{display:flex;gap:8px;margin-bottom:10px}
.tab{flex:1;padding:8px 4px;border:1px solid #222;border-radius:8px;background:#161616;color:#666;font-size:10px;cursor:pointer;font-family:Georgia,serif;letter-spacing:.08em;transition:all .2s;text-align:center}
.tab.active{border-color:#c9a84c;background:rgba(201,168,76,.08);color:#c9a84c}
.tab-count{font-size:20px;font-style:italic;color:#aaa;display:block;margin-bottom:1px}
.tab.active .tab-count{color:#c9a84c}
.search-row{display:flex;gap:8px}
.search-input{flex:1;background:#1a1a1a;color:#ddd;border:1px solid #2a2a2a;border-radius:8px;padding:10px 12px;font-size:14px;font-family:Georgia,serif;outline:none}
.btn-filter{padding:10px 14px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;color:#888;font-size:18px;cursor:pointer}
.btn-filter.active{background:rgba(201,168,76,.13);border-color:#c9a84c;color:#c9a84c}
.filter-panel{padding:14px 16px;background:#0f0f0f;border-bottom:1px solid #1a1a1a;display:none}
.filter-label{font-size:9px;color:#555;letter-spacing:.14em;margin-bottom:7px}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.pill{padding:4px 10px;border:1px solid #2a2a2a;border-radius:20px;background:transparent;color:#666;font-size:10px;cursor:pointer;font-family:Georgia,serif;white-space:nowrap;transition:all .15s}
.pill.active{border-color:#c9a84c;background:rgba(201,168,76,.13);color:#c9a84c}
.pill.clear{border-color:#444;color:#888}
.watched-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:11px;color:#888;margin-bottom:12px}
.watched-toggle input{accent-color:#c9a84c;width:15px;height:15px}
.count-bar{padding:7px 16px;color:#444;font-size:10px;letter-spacing:.12em;border-bottom:1px solid #181818}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 10px 80px}
@media(min-width:480px){.grid{grid-template-columns:repeat(3,1fr)}}
.card{border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid #1e1e1e;background:#141414;transition:opacity .2s}
.card:hover{border-color:#333}
.card.watched{opacity:.5}
.poster-wrap{position:relative;aspect-ratio:2/3;overflow:hidden;background:#1a1a1a}
.poster-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.poster-wrap svg{width:100%;height:100%;display:block;position:absolute;top:0;left:0}
.poster-img{position:relative;z-index:1}
.badge{position:absolute;top:6px;left:6px;color:#fff;font-size:8px;letter-spacing:.12em;padding:2px 6px;border-radius:3px;z-index:2}
.badge-family{background:#1b5e34}
.badge-solo{background:#4a1878}
.badge-seen{position:absolute;top:6px;right:6px;background:#c9a84c;color:#0d0d0d;font-size:8px;padding:2px 6px;border-radius:3px;z-index:2}
.card-info{padding:8px 10px 10px}
.card-title{font-size:13px;color:#f0e8d8;line-height:1.3;margin-bottom:2px}
.card-year{font-size:10px;color:#555;margin-bottom:5px}
.genre-pills{display:flex;flex-wrap:wrap;gap:3px}
.genre-tag{font-size:9px;color:#777;border:1px solid #252525;padding:1px 5px;border-radius:3px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.73);z-index:150;display:none;align-items:flex-end}
.overlay.open{display:flex}
.modal-box{background:#141414;width:100%;max-width:560px;margin:0 auto;border-radius:18px 18px 0 0;max-height:90vh;overflow-y:auto;box-shadow:0 -16px 60px #000}
.modal-hero{position:relative;height:230px;overflow:hidden;border-radius:18px 18px 0 0;background:#1a1a1a;flex-shrink:0}
.modal-hero img{width:100%;height:100%;object-fit:cover;display:block}
.modal-hero svg{width:100%;height:100%;display:block}
.modal-grad{position:absolute;inset:0;background:linear-gradient(transparent 40%,#141414 100%)}
.modal-close{position:absolute;top:14px;right:14px;background:rgba(0,0,0,.67);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:3}
.modal-badges{position:absolute;top:14px;left:14px;display:flex;gap:6px;z-index:3}
.modal-badge{color:#fff;font-size:9px;letter-spacing:.12em;padding:3px 8px;border-radius:4px}
.modal-body{padding:16px 18px 36px}
.modal-title{font-size:23px;color:#f5e6c8;font-style:italic;line-height:1.2;margin-bottom:4px}
.modal-year{font-size:12px;color:#555;margin-bottom:12px}
.modal-genres{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.modal-genre{font-size:10px;color:#888;border:1px solid #2a2a2a;padding:2px 8px;border-radius:4px}
.modal-desc{font-size:13px;color:#888;line-height:1.7;margin-bottom:16px}
.detail-section{border-top:1px solid #1e1e1e;padding-top:16px;margin-bottom:16px}
.detail-row{display:flex;gap:12px;margin-bottom:11px;align-items:flex-start}
.detail-label{font-size:9px;color:#555;letter-spacing:.13em;min-width:64px;padding-top:2px;flex-shrink:0}
.detail-val{font-size:13px;color:#d0c8b8;line-height:1.55;flex:1}
.why-box{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:12px 14px;margin-top:8px}
.why-label{font-size:9px;color:#c9a84c;letter-spacing:.14em;margin-bottom:6px}
.why-text{font-size:13px;color:#c0b8a8;line-height:1.65;font-style:italic}
.btn-watched{width:100%;padding:13px;border-radius:9px;border:none;font-size:14px;cursor:pointer;font-family:Georgia,serif;font-style:italic}
.btn-watched.unseen{background:#c9a84c;color:#0d0d0d}
.btn-watched.seen{background:#242424;color:#777}
.add-modal{background:#161616;width:100%;max-width:560px;margin:0 auto;border-radius:18px 18px 0 0;padding:20px 18px 36px;box-shadow:0 -12px 60px #000}
.drag-handle{width:36px;height:4px;background:#333;border-radius:2px;margin:0 auto 18px}
.add-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.add-title-text{font-size:20px;color:#f5e6c8;font-style:italic}
.btn-close{background:none;border:none;color:#555;font-size:24px;cursor:pointer;padding:4px;line-height:1}
.form-label{font-size:11px;color:#666;letter-spacing:.1em;display:block;margin-top:16px}
.form-input{width:100%;background:#1e1e1e;color:#e8e0d0;border:1px solid #333;border-radius:8px;padding:11px 13px;font-size:15px;font-family:Georgia,serif;outline:none;margin-top:5px}
.form-row{display:flex;gap:10px}
.form-row>div{flex:1}
.form-error{color:#e57373;font-size:12px;margin-top:8px}
.btn-submit{margin-top:22px;width:100%;padding:14px;background:#c9a84c;color:#0d0d0d;border:none;border-radius:10px;font-size:16px;font-family:Georgia,serif;font-style:italic;cursor:pointer;font-weight:bold}
.empty{text-align:center;color:#444;padding:60px 0;font-size:12px;letter-spacing:.12em}
.spinner{width:24px;height:24px;border:2px solid #333;border-top:2px solid #c9a84c;border-radius:50%;animation:spin .8s linear infinite;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div><h1>The Watchlist</h1><div class="subtitle" id="subtitle"></div></div>
    <button class="btn-add" onclick="openAdd()">+ Add Film</button>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-All" onclick="setList('All')"><span class="tab-count" id="count-All">0</span>ALL</button>
    <button class="tab" id="tab-Family" onclick="setList('Family')"><span class="tab-count" id="count-Family">0</span>FAMILY</button>
    <button class="tab" id="tab-Solo" onclick="setList('Solo')"><span class="tab-count" id="count-Solo">0</span>SOLO</button>
  </div>
  <div class="search-row">
    <input class="search-input" placeholder="Search..." oninput="setSearch(this.value)">
    <button class="btn-filter" id="filter-btn" onclick="toggleFilters()">&#9881;</button>
  </div>
</div>

<div id="filter-panel" class="filter-panel">
  <div class="filter-label">SORT</div>
  <div class="pills" id="sort-pills"></div>
  <label class="watched-toggle"><input type="checkbox" id="show-watched" checked onchange="render()"> SHOW ALREADY WATCHED</label>
  <div class="filter-label">GENRE</div>
  <div class="pills" id="genre-pills"></div>
</div>

<div class="count-bar" id="count-bar"></div>
<div class="grid" id="grid"></div>
<div class="empty" id="empty" style="display:none">NO FILMS MATCH</div>

<!-- Detail modal -->

<div class="overlay" id="detail-overlay" onclick="closeDetail()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-hero" id="modal-hero"></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- Add modal -->

<div class="overlay" id="add-overlay" onclick="closeAdd()">
  <div class="add-modal" onclick="event.stopPropagation()">
    <div class="drag-handle"></div>
    <div class="add-header">
      <span class="add-title-text">Add a Film</span>
      <button class="btn-close" onclick="closeAdd()">&#10005;</button>
    </div>
    <label class="form-label">TITLE *</label>
    <input class="form-input" id="add-title" placeholder="Film title">
    <div class="form-row">
      <div><label class="form-label">YEAR</label><input class="form-input" id="add-year" placeholder="2024" type="number"></div>
      <div><label class="form-label">LIST</label>
        <select class="form-input" id="add-list"><option value="Family">Family</option><option value="Solo">Solo</option></select>
      </div>
    </div>
    <label class="form-label">GENRES (comma separated)</label>
    <input class="form-input" id="add-genres" placeholder="Drama, Comedy">
    <label class="form-label">DESCRIPTION</label>
    <input class="form-input" id="add-desc" placeholder="One-line summary">
    <div class="form-error" id="add-error"></div>
    <button class="btn-submit" onclick="submitAdd()">Add to Watchlist</button>
  </div>
</div>

// Poster cache: tmdb_id -> poster_path
const posterCache = {};

async function fetchPoster(tmdb_id) {
  if (!tmdb_id) return null;
  if (posterCache[tmdb_id] !== undefined) return posterCache[tmdb_id];
  try {
    const r = await fetch(`${TMDB_BASE}/movie/${tmdb_id}?language=en-US`, {
      headers: { 'Authorization': `Bearer ${TMDB_TOKEN}`, 'accept': 'application/json' }
    });
    const d = await r.json();
    posterCache[tmdb_id] = d.poster_path || null;
    return d.poster_path || null;
  } catch(e) {
    posterCache[tmdb_id] = null;
    return null;
  }
}

function svgFallback(m) {
  const t = m.title.length > 18 ? m.title.substring(0,16) + '...' : m.title;
  return `<svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="g${m.id}" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="${m.color1}"/><stop offset="100%" stop-color="${m.color2}"/>
    </linearGradient></defs>
    <rect width="200" height="300" fill="url(#g${m.id})"/>
    <rect x="12" y="12" width="176" height="276" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
    <text x="100" y="148" text-anchor="middle" font-size="58" dominant-baseline="middle">${m.emoji}</text>
    <rect x="0" y="220" width="200" height="80" fill="rgba(0,0,0,.4)"/>
    <text x="100" y="247" text-anchor="middle" font-size="12" font-family="Georgia,serif" font-style="italic" fill="#f5e6c8">${t}</text>
    <text x="100" y="265" text-anchor="middle" font-size="10" font-family="Georgia,serif" fill="#c9a84c">${m.year || 'TBD'}</text>
  </svg>`;
}

  const h = heightPx ? `height:${heightPx}px` : 'height:100%';
  const imgStyle = `width:100%;${h};object-fit:cover;display:none;position:relative;z-index:1`;
  const svgStyle = `width:100%;${h};display:block;position:absolute;top:0;left:0;z-index:0`;
  return `
    <div class="spinner" id="spin-${m.id}"></div>
    <div id="svg-${m.id}" style="${svgStyle}">${svgFallback(m)}</div>
    <img id="img-${m.id}" style="${imgStyle}" alt="${m.title}"
      onload="this.style.display='block';var s=document.getElementById('spin-${m.id}');if(s)s.style.display='none';"
      onerror="this.style.display='none';var s=document.getElementById('spin-${m.id}');if(s)s.style.display='none';">`;
}

// After rendering, kick off poster loads
function loadPosters(ids) {
  ids.forEach(async id => {
    const m = movies.find(x => x.id === id);
    if (!m || !m.tmdb_id) {
      const s = document.getElementById('spin-' + id);
      if (s) s.style.display = 'none';
      return;
    }
    const path = await fetchPoster(m.tmdb_id);
    const img = document.getElementById('img-' + id);
    if (img && path) {
      img.src = TMDB_IMG + path;
    } else {
      const s = document.getElementById('spin-' + id);
      if (s) s.style.display = 'none';
    }
  });
}

function load() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) {
      const saved = JSON.parse(s);
      const seedIds = new Set(SEED.map(m => m.id));
      const extras = saved.filter(m => !seedIds.has(m.id));
      const merged = SEED.map(m => { const sv = saved.find(x => x.id === m.id); return sv ? Object.assign({}, m, {watched: sv.watched, list: sv.list}) : m; });
      return merged.concat(extras);
    }
  } catch(e) {}
  return SEED.slice();
}
function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(movies)); } catch(e) {} }

let movies = load();
let activeList = 'All', selGenres = [], sortBy = 'list', search = '';

function getFiltered() {
  let m = movies;
  if (activeList !== 'All') m = m.filter(x => x.list === activeList);
  const sw = document.getElementById('show-watched');
  if (sw && !sw.checked) m = m.filter(x => !x.watched);
  if (selGenres.length) m = m.filter(x => selGenres.every(g => x.genre.includes(g)));
  if (search.trim()) { const s = search.toLowerCase(); m = m.filter(x => x.title.toLowerCase().includes(s) || x.desc.toLowerCase().includes(s)); }
  const out = m.slice();
  if (sortBy === 'title') out.sort((a,b) => a.title.localeCompare(b.title));
  else if (sortBy === 'year') out.sort((a,b) => (a.year||9999)-(b.year||9999));
  else if (sortBy === 'year-desc') out.sort((a,b) => (b.year||0)-(a.year||0));
  else out.sort((a,b) => { if(a.list!==b.list) return a.list==='Family'?-1:1; return a.title.localeCompare(b.title); });
  return out;
}

function render() {
  const fam = movies.filter(m=>m.list==='Family').length;
  const sol = movies.filter(m=>m.list==='Solo').length;
  const seen = movies.filter(m=>m.watched).length;
  document.getElementById('subtitle').textContent = seen + ' WATCHED - ' + (movies.length-seen) + ' TO GO';
  document.getElementById('count-All').textContent = movies.length;
  document.getElementById('count-Family').textContent = fam;
  document.getElementById('count-Solo').textContent = sol;
  ['All','Family','Solo'].forEach(l => {
    document.getElementById('tab-'+l).className = 'tab' + (activeList===l?' active':'');
  });
  const sorts = [['list','Default'],['title','A-Z'],['year','Oldest'],['year-desc','Newest']];
  document.getElementById('sort-pills').innerHTML = sorts.map(([v,l]) =>
    `<button class="pill${sortBy===v?' active':''}" onclick="setSort('${v}')">${l}</button>`).join('');
  const allGenres = [...new Set(movies.flatMap(m=>m.genre))].sort();
  document.getElementById('genre-pills').innerHTML = allGenres.map(g =>
    `<button class="pill${selGenres.includes(g)?' active':''}" onclick="toggleGenre('${g}')">${g}</button>`).join('') +
    (selGenres.length ? `<button class="pill clear" onclick="clearGenres()">Clear</button>` : '');
  const filtered = getFiltered();
  document.getElementById('count-bar').textContent = filtered.length + ' FILM' + (filtered.length!==1?'S':'');
  if (!filtered.length) {
    document.getElementById('grid').innerHTML = '';
    document.getElementById('empty').style.display = 'block';
    return;
  }
  document.getElementById('empty').style.display = 'none';
  document.getElementById('grid').innerHTML = filtered.map(m => `
    <div class="card${m.watched?' watched':''}" onclick="openDetail(${m.id})">
      <div class="poster-wrap">${makePosterCell(m)}
        <div class="badge badge-${m.list.toLowerCase()}">${m.list.toUpperCase()}</div>
        ${m.watched?'<div class="badge-seen">SEEN</div>':''}
      </div>
      <div class="card-info">
        <div class="card-title">${m.title}</div>
        <div class="card-year">${m.year||'TBD'}</div>
        <div class="genre-pills">${m.genre.slice(0,2).map(g=>`<span class="genre-tag">${g}</span>`).join('')}${m.genre.length>2?`<span class="genre-tag">+${m.genre.length-2}</span>`:''}</div>
      </div>
    </div>`).join('');
  loadPosters(filtered.map(m=>m.id));
}

function setList(l) { activeList=l; render(); }
function setSearch(v) { search=v; render(); }
function setSort(v) { sortBy=v; render(); }
function toggleGenre(g) { selGenres=selGenres.includes(g)?selGenres.filter(x=>x!==g):[...selGenres,g]; render(); }
function clearGenres() { selGenres=[]; render(); }
function toggleFilters() {
  const p = document.getElementById('filter-panel');
  const b = document.getElementById('filter-btn');
  const show = p.style.display !== 'block';
  p.style.display = show ? 'block' : 'none';
  b.className = 'btn-filter' + (show?' active':'');
}

function openDetail(id) {
  const m = movies.find(x => x.id===id);
  const heroInner = makePosterCell(m, 230);
  document.getElementById('modal-hero').innerHTML = heroInner +
    `<div class="modal-grad"></div>
     <button class="modal-close" onclick="closeDetail()">&#10005;</button>
     <div class="modal-badges">
       <span class="modal-badge" style="background:${m.list==='Family'?'#1b5e34':'#4a1878'}">${m.list.toUpperCase()}</span>
       ${m.watched?'<span class="modal-badge" style="background:#c9a84c;color:#0d0d0d">SEEN</span>':''}
     </div>`;
  loadPosters([id]);
  const rows = [['RUNTIME',m.runtime],['DIRECTOR',m.director],['CAST',m.cast],['RATING',m.rating],['IMDb',m.imdb],['AWARDS',m.awards]]
    .filter(([,v])=>v&&v!=='TBD')
    .map(([l,v])=>`<div class="detail-row"><div class="detail-label">${l}</div><div class="detail-val">${v}</div></div>`).join('');
  document.getElementById('modal-body').innerHTML =
    `<div class="modal-title">${m.title}</div>
     <div class="modal-year">${m.year||'TBD'}</div>
     <div class="modal-genres">${m.genre.map(g=>`<span class="modal-genre">${g}</span>`).join('')}</div>
     <p class="modal-desc">${m.desc}</p>
     <div class="detail-section">${rows}
       ${m.why&&m.why!=='TBD'?`<div class="why-box"><div class="why-label">WHY WATCH</div><div class="why-text">${m.why}</div></div>`:''}
     </div>
     <button class="btn-watched ${m.watched?'seen':'unseen'}" onclick="toggleWatched(${m.id})">
       ${m.watched?'Mark as Unwatched':'Mark as Watched'}
     </button>`;
  document.getElementById('detail-overlay').className = 'overlay open';
}

function closeDetail() { document.getElementById('detail-overlay').className = 'overlay'; }
function toggleWatched(id) { movies=movies.map(m=>m.id===id?Object.assign({},m,{watched:!m.watched}):m); save(); closeDetail(); render(); }

function openAdd() { document.getElementById('add-overlay').className='overlay open'; }
function closeAdd() { document.getElementById('add-overlay').className='overlay'; document.getElementById('add-error').textContent=''; }
function submitAdd() {
  const title = document.getElementById('add-title').value.trim();
  const year = document.getElementById('add-year').value;
  const list = document.getElementById('add-list').value;
  const genres = document.getElementById('add-genres').value.split(',').map(g=>g.trim()).filter(Boolean);
  const desc = document.getElementById('add-desc').value.trim();
  if (!title) { document.getElementById('add-error').textContent='Title is required.'; return; }
  if (movies.some(m=>m.title.toLowerCase()===title.toLowerCase())) { document.getElementById('add-error').textContent='Already on a list!'; return; }
  const colors = [['#1a2a3a','#2d3a4a'],['#2a1a3a','#3a2d4a'],['#1a3a1a','#2d4a2d'],['#3a1a1a','#4a2d2d']];
  const color = colors[title.charCodeAt(0)%colors.length];
  movies = movies.concat([{id:Date.now(),title,year:year?parseInt(year):null,list,genre:genres.length?genres:['Drama'],desc:desc||'No description yet.',watched:false,emoji:'🎬',color1:color[0],color2:color[1],tmdb_id:null,runtime:'TBD',director:'TBD',cast:'TBD',rating:'TBD',imdb:'TBD',awards:'TBD',why:'Recently added.'}]);
  save(); closeAdd();
  ['add-title','add-year','add-genres','add-desc'].forEach(id=>{document.getElementById(id).value='';});
  render();
}

render();
</script>
